Import:
  - utils
  - common

View:
  # Optional - style the screen
  styles:
    scrollableView: true
    
  # Optional - set the header for the screen
  header:
    title: r@title
    
  onLoad: |
    saveName('John','Doe');
    console.log('name is ='+getName());
    console.log(env.apiURL)
    console.log(secrets.testSecret)
    
  # Specify the body of the screen
  body:
    Column:
      styles:
        padding: 24
        gap: 8
      children:
        - Text:
            testId: greeting_text
            className: title
            text: Hello ${ensemble.storage.helloApp.name.first} ${ensemble.storage.helloApp.name.last}
            
        - Text:
            testId: description_text
            text: Welcome to our Ensemble app
            styles:
              color: '#444444'
              
        - MyCustomWidget1:
            testId: custom_widget
            inputs:
              inputName: ${ensemble.storage.helloApp.name}
              
        - Button:
            testId: api_button
            label: Call API in imported library
            onTap: |-
              callMockMethod();
              console.log('name is ='+getName());
        - Button:
            testId: show_message_button
            label: Show message via reusable Action
            onTap:
              executeAction:
                name: showMessage
                inputs:
                  message: Hello ${ensemble.storage.helloApp.name.first}

        - Button:
            testId: call_api_button
            testId: fetch_user_action_button
            label: Fetch user (app Action with API)
            onTap:
              executeAction:
                name: fetchUser
                inputs:
                  userId: ${Math.floor(Math.random() * 100)}
                events:
                  onSuccess:
                    showToast:
                      message: Loaded ${event.data.user.firstName} ${event.data.user.lastName}
                  onError:
                    showToast:
                      message: ${event.data.message}

        - Button:
            label: Call API (page reusable action)
            onTap:
              executeAction:
                name: callAPI
                inputs:
                  call: true
        - Button:
            testId: navigate_button
            label: Navigate to Goodbye Screen
            styles:
              marginTop: 16
              padding: 12
            onTap:
              navigateScreen:
                name: Goodbye
                
        - Image:
            testId: logo_image
            source: logo.svg
            styles:
              width: 200
              height: 200
              marginTop: 24

Action:
  callAPI:
    inputs:
      - call
    body:
      executeConditionalAction:
        conditions:
          - if: ${call == true}
            action:
              invokeAPI:
                name: mockAPI

Global: |-
  //var myVar = myButton.label;
  function globalHello() {
    console.log('hello');
  }

API:
  mockAPI:
    url: ${env.apiURL}/users/1
    method: GET
    onResponse: |-
      saveName('Michael', 'Jordan');
