# Automates Releasing a New Version
#   melos version ensemble <version>
#   git push --follow-tags origin main

name: Release Ensemble Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: New semver (e.g. 1.2.39)
        required: true
        type: string

concurrency:
  group: melos-release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.5"
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Version packages
        run: melos version ensemble "${{ inputs.version }}" --yes

      - name: Push branch and tags
        run: git push origin main --follow-tags
