# Automates Releasing a New Version
#   melos version ensemble [version]
#   git push --follow-tags origin main

name: Release Ensemble Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: Optional new semver (e.g. 1.2.39). Defaults to latest release + patch bump.
        required: false
        type: string

concurrency:
  group: melos-release-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.32.5"
          cache: true

      - name: Install Melos
        run: dart pub global activate melos

      - name: Bootstrap
        run: melos bootstrap

      - name: Resolve version
        id: resolve-version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"

          if [ -z "$version" ]; then
            latest_tag="$(gh release list \
              --repo "$GITHUB_REPOSITORY" \
              --limit 100 \
              --json tagName,isDraft \
              --jq '[.[] | select(.isDraft | not) | .tagName | select(test("^ensemble-v[0-9]+\\.[0-9]+\\.[0-9]+$"))][0] // ""')"

            if [ -z "$latest_tag" ]; then
              latest_tag="$(git tag --list 'ensemble-v[0-9]*' --sort=-v:refname | sed -n '1p')"
            fi

            if [[ ! "$latest_tag" =~ ^ensemble-v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "::error::Could not find a latest ensemble release/tag to bump."
              exit 1
            fi

            version="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must be a stable semver value like 1.2.39. For beta releases, use 'Release Beta Version' workflow."
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved ensemble version: $version"

      - name: Version packages
        run: |
          melos version \
            --scope=ensemble \
            --scope=ensemble_network_info \
            --scope=ensemble_stripe \
            --scope=ensemble_file_manager \
            --scope=ensemble_chat \
            --scope=ensemble_auth \
            --scope=ensemble_bluetooth \
            --scope=ensemble_wifi \
            --scope=ensemble_face_camera \
            --scope=ensemble_connect \
            --scope=ensemble_contacts \
            --scope=ensemble_location \
            --scope=ensemble_camera \
            --scope=ensemble_deeplink \
            --scope=ensemble_remote_config \
            --scope=ensemble_firebase_analytics \
            --scope=ensemble_qr_scanner \
            --scope=ensemble_adobe_analytics \
            --scope=ensemble_moengage \
            --scope=ensemble_bracket \
            --scope=ensemble_test_runner \
            --manual-version ensemble:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_network_info:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_stripe:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_file_manager:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_chat:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_auth:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_bluetooth:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_wifi:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_face_camera:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_connect:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_contacts:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_location:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_camera:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_deeplink:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_remote_config:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_firebase_analytics:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_qr_scanner:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_adobe_analytics:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_moengage:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_bracket:${{ steps.resolve-version.outputs.version }} \
            --manual-version ensemble_test_runner:${{ steps.resolve-version.outputs.version }} \
            --yes

      - name: Push branch and tags
        run: |
          git push origin main
          git push origin ensemble-v${{ steps.resolve-version.outputs.version }}
          git push origin --tags
