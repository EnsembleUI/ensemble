name: ensemble_qr_scanner
description: QR Code and Barcode scanner module for Ensemble Framework. Lightweight module with minimal dependencies.

homepage: https://ensembleui.com
repository: https://github.com/EnsembleUI/ensemble
issue_tracker: https://github.com/EnsembleUI/ensemble/issues
documentation: https://github.com/EnsembleUI/ensemble/tree/main/modules/qr_scanner#readme

topics:
  - qr-code
  - barcode
  - scanner
  - ensemble

platforms:
  android:
  ios:
  macos:
  web:
  windows:

version: 1.2.49

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # Ensemble core framework
  ensemble:
    git:
      url: https://github.com/EnsembleUI/ensemble.git
      ref: ensemble-v1.2.48-beta.2
      path: modules/ensemble

  # QR/Barcode scanning
  mobile_scanner: ^7.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
