name: ensemble_adobe_analytics
description: Adobe Analytics integration for Ensemble apps, with tracking, identity, consent, assurance, and user profile APIs.
homepage: https://ensembleui.com
repository: https://github.com/EnsembleUI/ensemble/tree/main/modules/adobe_analytics
issue_tracker: https://github.com/EnsembleUI/ensemble/issues
documentation: https://github.com/EnsembleUI/ensemble/tree/main/modules/adobe_analytics#readme
topics:
  - adobe-analytics
  - analytics
  - low-code
  - ensemble
version: 1.2.49

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  ensemble:
    git:
      url: https://github.com/EnsembleUI/ensemble.git
      ref: ensemble-v1.2.48-beta.2
      path: modules/ensemble

  flutter_aepcore: ^5.0.0
  flutter_aepedge: ^5.0.0
  flutter_aepassurance: ^5.0.0
  flutter_aepedgeidentity: ^5.0.0
  flutter_aepedgeconsent: ^5.0.0
  flutter_aepuserprofile: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
