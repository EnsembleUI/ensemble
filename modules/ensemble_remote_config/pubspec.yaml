name: ensemble_remote_config
description: Firebase Remote Config integration for Ensemble apps, including typed value lookup, refresh, defaults, and runtime diagnostics.
homepage: https://ensembleui.com
repository: https://github.com/EnsembleUI/ensemble
issue_tracker: https://github.com/EnsembleUI/ensemble/issues
documentation: https://github.com/EnsembleUI/ensemble/tree/main/modules/ensemble_remote_config#readme
topics:
  - remote-config
  - firebase
  - low-code
  - ensemble
platforms:
  android:
  ios:
  macos:
  web:
  windows:

version: 1.2.48

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.2.0
  firebase_remote_config: ^6.1.4

  ensemble:
    git:
      url: https://github.com/EnsembleUI/ensemble.git
      ref: ensemble-v1.2.46-beta.3
      path: modules/ensemble

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3

flutter:
  uses-material-design: true
