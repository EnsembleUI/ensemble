name: smart_wifi_connect
description: A lightweight Flutter plugin to connect to a Wi-Fi network using SSID and password.
version: 0.1.0
homepage: https://github.com/EnsembleUI/ensemble/tree/main/packages/smart_wifi_connect

environment:
  sdk: ">=3.5.0"
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.ensembleui.smart_wifi_connect
        pluginClass: SmartWifiConnectPlugin
      ios:
        pluginClass: SmartWifiConnectPlugin
