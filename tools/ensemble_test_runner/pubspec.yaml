name: ensemble_test_runner
description: Declarative YAML test runner for Ensemble apps with runtime mocks, widget assertions, fixtures, and CLI reporting.
version: 1.2.51
homepage: https://ensembleui.com
repository: https://github.com/EnsembleUI/ensemble/tree/main/tools/ensemble_test_runner
issue_tracker: https://github.com/EnsembleUI/ensemble/issues
documentation: https://github.com/EnsembleUI/ensemble/tree/main/tools/ensemble_test_runner#readme
topics:
  - testing
  - yaml
  - flutter
  - ensemble

executables:
  ensemble_test: ensemble_test

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.24.0"

dependencies:
  ensemble: ">=1.2.50 <2.0.0"
  device_frame: ^1.3.0
  ensemble_device_preview: ^1.1.3
  flutter:
    sdk: flutter
  flutter_test:
    sdk: flutter
  yaml: ^3.1.2
  path: ^1.9.0
  image: ^4.8.0
  firebase_core: ^4.2.0
  firebase_core_platform_interface: ^6.0.2
  cloud_functions_platform_interface: ^5.8.6
  cloud_firestore_platform_interface: ^7.0.3
  firebase_auth_platform_interface: ^8.1.3
  http: ^1.2.2
  get_it: ^8.0.3
  sqflite_common_ffi: ^2.3.6

dev_dependencies:
  flutter_lints: ^2.0.3
  cloud_functions: ^6.0.3
  firebase_auth: ^6.1.1
  lottie: ^3.0.0

flutter:
  uses-material-design: true
